<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACS Triage Report - {{date}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 10px; }
        .metadata { color: #666; font-size: 14px; margin-bottom: 30px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; }
        .stat-card.ci { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .stat-card.vuln { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .stat-card.flaky { background: linear-gradient(135deg, #30cfd0 0%, #330867 100%); }
        .stat-card.unknown { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .stat-number { font-size: 36px; font-weight: bold; }
        .stat-label { font-size: 14px; opacity: 0.9; margin-top: 5px; }
        .filters { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .filters select, .filters input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .filters input[type="text"] { flex: 1; min-width: 200px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; text-align: left; padding: 12px; font-weight: 600; border-bottom: 2px solid #dee2e6; cursor: pointer; user-select: none; }
        th:hover { background: #e9ecef; }
        th.sorted-asc::after { content: ' ↑'; }
        th.sorted-desc::after { content: ' ↓'; }
        td { padding: 12px; border-bottom: 1px solid #dee2e6; }
        tr:hover { background: #f8f9fa; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .badge.ci { background: #f5576c; color: white; }
        .badge.vulnerability { background: #fee140; color: #333; }
        .badge.flaky { background: #30cfd0; color: white; }
        .badge.unknown { background: #fed6e3; color: #333; }
        .confidence-high { color: #28a745; font-weight: bold; }
        .confidence-med { color: #ffc107; font-weight: bold; }
        .confidence-low { color: #dc3545; font-weight: bold; }
        .warning { color: #ff6b6b; }
        a { color: #667eea; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ACS Triage Report</h1>
        <div class="metadata">
            <strong>Date:</strong> {{date}} |
            <strong>Filters:</strong> 103399, 95004 |
            <strong>Total Issues:</strong> {{total_issues}} |
            <strong>Version:</strong> {{stackrox_version}}
        </div>

        <div class="stats">
            <div class="stat-card ci">
                <div class="stat-number">{{ci_count}}</div>
                <div class="stat-label">CI Failures</div>
            </div>
            <div class="stat-card vuln">
                <div class="stat-number">{{vuln_count}}</div>
                <div class="stat-label">Vulnerabilities</div>
            </div>
            <div class="stat-card flaky">
                <div class="stat-number">{{flaky_count}}</div>
                <div class="stat-label">Flaky Tests</div>
            </div>
            <div class="stat-card unknown">
                <div class="stat-number">{{unknown_count}}</div>
                <div class="stat-label">Unknown</div>
            </div>
        </div>

        <div class="filters">
            <select id="typeFilter">
                <option value="">All Types</option>
                <option value="CI_FAILURE">CI Failure</option>
                <option value="VULNERABILITY">Vulnerability</option>
                <option value="FLAKY_TEST">Flaky Test</option>
                <option value="UNKNOWN">Unknown</option>
            </select>

            <select id="teamFilter">
                <option value="">All Teams</option>
                <option value="@stackrox/core-workflows">Core Workflows</option>
                <option value="@stackrox/scanner">Scanner</option>
                <option value="@stackrox/sensor-ecosystem">Sensor Ecosystem</option>
                <option value="@stackrox/collector">Collector</option>
                <option value="@stackrox/install">Install</option>
                <option value="@stackrox/ui">UI</option>
                <option value="Needs Manual Assignment">Needs Manual</option>
            </select>

            <select id="confidenceFilter">
                <option value="">All Confidence</option>
                <option value="high">High (≥90%)</option>
                <option value="medium">Medium (70-89%)</option>
                <option value="low">Low (<70%)</option>
            </select>

            <label><input type="checkbox" id="versionMismatchFilter"> Version Mismatch Only</label>

            <input type="text" id="searchFilter" placeholder="Search by issue key or summary...">
        </div>

        <table id="issuesTable">
            <thead>
                <tr>
                    <th data-sort="key">Issue</th>
                    <th data-sort="type">Type</th>
                    <th data-sort="team">Team</th>
                    <th data-sort="confidence">Confidence</th>
                    <th data-sort="strategy">Strategy</th>
                    <th data-sort="version_mismatch">Version</th>
                    <th>Summary</th>
                </tr>
            </thead>
            <tbody id="issuesBody">
                <!-- Issues will be inserted here by JavaScript -->
            </tbody>
        </table>
    </div>

    <script>
        // Embed issue data (will be replaced by actual data)
        const issues = {{issues_json}};

        let sortColumn = null;
        let sortDirection = 'asc';

        function renderIssues(filteredIssues) {
            const tbody = document.getElementById('issuesBody');
            tbody.innerHTML = '';

            filteredIssues.forEach(issue => {
                const tr = document.createElement('tr');

                const confidence = issue.team_assignment?.confidence || 0;
                const confClass = confidence >= 90 ? 'confidence-high' :
                                 confidence >= 70 ? 'confidence-med' : 'confidence-low';

                tr.innerHTML = `
                    <td><a href="https://issues.redhat.com/browse/${issue.key}" target="_blank">${issue.key}</a></td>
                    <td><span class="badge ${issue.type?.toLowerCase()}">${issue.type || 'UNKNOWN'}</span></td>
                    <td>${issue.team_assignment?.assigned_team || 'Unassigned'}</td>
                    <td class="${confClass}">${confidence}%</td>
                    <td>${issue.team_assignment?.strategy || 'N/A'}</td>
                    <td>${issue.version_mismatch ? '<span class="warning">⚠️</span>' : '✓'}</td>
                    <td>${issue.summary || ''}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterIssues() {
            const typeFilter = document.getElementById('typeFilter').value;
            const teamFilter = document.getElementById('teamFilter').value;
            const confidenceFilter = document.getElementById('confidenceFilter').value;
            const versionMismatchOnly = document.getElementById('versionMismatchFilter').checked;
            const searchText = document.getElementById('searchFilter').value.toLowerCase();

            let filtered = issues.filter(issue => {
                if (typeFilter && issue.type !== typeFilter) return false;
                if (teamFilter && issue.team_assignment?.assigned_team !== teamFilter) return false;

                if (confidenceFilter) {
                    const conf = issue.team_assignment?.confidence || 0;
                    if (confidenceFilter === 'high' && conf < 90) return false;
                    if (confidenceFilter === 'medium' && (conf < 70 || conf >= 90)) return false;
                    if (confidenceFilter === 'low' && conf >= 70) return false;
                }

                if (versionMismatchOnly && !issue.version_mismatch) return false;

                if (searchText) {
                    const matchKey = issue.key?.toLowerCase().includes(searchText);
                    const matchSummary = issue.summary?.toLowerCase().includes(searchText);
                    if (!matchKey && !matchSummary) return false;
                }

                return true;
            });

            if (sortColumn) {
                filtered.sort((a, b) => {
                    let aVal = a[sortColumn];
                    let bVal = b[sortColumn];

                    if (sortColumn === 'team') {
                        aVal = a.team_assignment?.assigned_team || '';
                        bVal = b.team_assignment?.assigned_team || '';
                    } else if (sortColumn === 'confidence') {
                        aVal = a.team_assignment?.confidence || 0;
                        bVal = b.team_assignment?.confidence || 0;
                    } else if (sortColumn === 'strategy') {
                        aVal = a.team_assignment?.strategy || '';
                        bVal = b.team_assignment?.strategy || '';
                    } else if (sortColumn === 'version_mismatch') {
                        aVal = a.version_mismatch ? 1 : 0;
                        bVal = b.version_mismatch ? 1 : 0;
                    }

                    if (sortDirection === 'asc') {
                        return aVal > bVal ? 1 : -1;
                    } else {
                        return aVal < bVal ? 1 : -1;
                    }
                });
            }

            renderIssues(filtered);
        }

        // Add event listeners
        document.getElementById('typeFilter').addEventListener('change', filterIssues);
        document.getElementById('teamFilter').addEventListener('change', filterIssues);
        document.getElementById('confidenceFilter').addEventListener('change', filterIssues);
        document.getElementById('versionMismatchFilter').addEventListener('change', filterIssues);
        document.getElementById('searchFilter').addEventListener('input', filterIssues);

        // Add sorting
        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                const column = th.dataset.sort;
                if (sortColumn === column) {
                    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    sortColumn = column;
                    sortDirection = 'asc';
                }

                document.querySelectorAll('th').forEach(h => {
                    h.classList.remove('sorted-asc', 'sorted-desc');
                });
                th.classList.add(`sorted-${sortDirection}`);

                filterIssues();
            });
        });

        // Initial render
        filterIssues();
    </script>
</body>
</html>
